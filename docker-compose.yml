version: "3.8"

services:
  minio:
    build:
      context: .
      dockerfile: Dockerfile
    command: server --address ":9000" --console-address ":9001" /data{1...4}
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - data1:/data1
      - data2:/data2
      - data3:/data3
      - data4:/data4

volumes:
  data1:
  data2:
  data3:
  data4:
